<title>Jaiclub App Download</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI, Arial, sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#000;
    overflow:hidden;
}

/* Animated Grid Background */
body::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:
    repeating-linear-gradient(
        transparent,
        transparent 48px,
        rgba(0,255,100,0.08) 50px
    ),
    repeating-linear-gradient(
        90deg,
        transparent,
        transparent 48px,
        rgba(0,255,100,0.08) 50px
    );
    animation:bgMove 10s linear infinite;
}

@keyframes bgMove{
    from{
        transform:translateY(-20px);
    }
    to{
        transform:translateY(20px);
    }
}

.card{
    position:relative;
    z-index:2;
    width:380px;
    background:rgba(10,10,10,0.92);
    border:1px solid rgba(0,255,100,0.3);
    border-radius:25px;
    padding:40px 30px;
    text-align:center;
    backdrop-filter:blur(12px);
    box-shadow:
        0 0 20px rgba(0,255,100,0.25),
        0 0 50px rgba(0,255,100,0.12);
}

.logo{
    width:95px;
    height:95px;
    margin:auto;
    border-radius:20px;
    background:linear-gradient(135deg,#00ff88,#00ccff);
    color:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:38px;
    font-weight:bold;
    box-shadow:0 0 25px #00ff88;
}

h1{
    margin-top:20px;
    color:#00ff88;
    font-size:36px;
    letter-spacing:2px;
    text-shadow:0 0 15px #00ff88;
}

.version{
    color:#bbb;
    margin-top:10px;
    font-size:17px;
}

.info{
    margin-top:25px;
    color:#ddd;
    line-height:1.8;
    font-size:15px;
}

.download-btn{
    display:inline-block;
    margin-top:30px;
    padding:16px 35px;
    border-radius:50px;
    background:linear-gradient(45deg,#00ff88,#00ccff);
    color:#000;
    text-decoration:none;
    font-size:20px;
    font-weight:bold;
    transition:0.4s;
    box-shadow:
        0 0 20px #00ff88,
        0 0 40px rgba(0,255,136,0.4);
}

.download-btn:hover{
    transform:scale(1.08);
    box-shadow:
        0 0 30px #00ff88,
        0 0 60px #00ccff;
}

.footer{
    margin-top:25px;
    color:#777;
    font-size:13px;
}
</style>
</head>

        📥 Download APK
    </a>

    <div class="footer">
        © 2026 Jaiclub App. All Rights Reserved.
    </div>

</div>

</body>
</html>
